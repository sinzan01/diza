<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f5f7fa;
            color: #444;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .question {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 14px 18px;
            background: #f1f3f8;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover {
            background: #e1e7f5;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: #d0d8e8;
            color: #333;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-card {
            display: none;
        }
        .result-title {
            font-size: 20px;
            margin-bottom: 12px;
            color: #2d3748;
        }
        .result-desc {
            line-height: 1.7;
            margin: 10px 0;
        }
        .bar {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin: 6px 0 14px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: #a8b8d8;
        }
        .tip {
            color: #999;
            font-size: 14px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card test-card">
            <div class="title">人格测试</div>
            <div id="questionBox"></div>
            <div class="options" id="optionsBox"></div>
            <button class="btn" id="prevBtn" style="display:none;">上一题</button>
        </div>

        <div class="card result-card" id="resultCard">
            <div class="result-title" id="personaTitle"></div>
            <div class="result-desc" id="personaDesc"></div>

            <div style="margin:24px 0;">
                <div>契合指数</div>
                <div class="bar"><div class="bar-fill" id="bar1" style="width:0%"></div></div>
                <div>匹配指数</div>
                <div class="bar"><div class="bar-fill" id="bar2" style="width:0%"></div></div>
                <div>独特指数</div>
                <div class="bar"><div class="bar-fill" id="bar3" style="width:0%"></div></div>
            </div>

            <div><strong>职业适配：</strong><span id="job"></span></div>
            <div style="margin-top:8px;"><strong>伴侣推荐：</strong><span id="lover"></span></div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "如果你不得不选择下面其中一个作为伴侣，你会：",
                o: ["A：地扎", "B：cxx", "C：sakura"]
            },
            {
                q: "如果地扎突然来投怀送抱，你会：",
                o: ["A：宠她", "B：疑惑", "C：厌恶"]
            },
            {
                q: "你对未来另一半的期望是：",
                o: ["A：可爱呆萌", "B：成熟知性", "C：性格古怪"]
            }
        ];

        let current = 0;
        let answers = [];

        const qBox = document.getElementById('questionBox');
        const optBox = document.getElementById('optionsBox');
        const prevBtn = document.getElementById('prevBtn');
        const testCard = document.querySelector('.test-card');
        const resultCard = document.getElementById('resultCard');
        const personaTitle = document.getElementById('personaTitle');
        const personaDesc = document.getElementById('personaDesc');
        const job = document.getElementById('job');
        const lover = document.getElementById('lover');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');

        function render() {
            qBox.innerHTML = `<div class="question">${current+1}. ${questions[current].q}</div>`;
            optBox.innerHTML = '';
            questions[current].o.forEach((op, i) => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = op;
                div.onclick = () => {
                    answers[current] = op[0];
                    if (current < 2) {
                        current++;
                        render();
                    } else {
                        showResult();
                    }
                };
                optBox.appendChild(div);
            });
            prevBtn.style.display = current > 0 ? 'inline-block' : 'none';
        }

        prevBtn.onclick = () => {
            if (current > 0) {
                current--;
                render();
            }
        };

        function showResult() {
            testCard.style.display = 'none';
            resultCard.style.display = 'block';
            const key = answers.join('');
            let title, desc, j, l, a1, a2, a3;

            switch(key) {
                case 'AAA':
                    title = '喜欢地扎型人格';
                    desc = '你非常喜欢地扎，对她充满偏爱与包容，是纯粹的偏爱型人格。';
                    j = '创意类、陪伴型职业、设计师';
                    l = '可爱粘人、温柔专一';
                    a1=95,a2=90,a3=60; break;
                case 'AAB':
                    title = '喜欢地扎但对她有要求型人格';
                    desc = '你喜欢地扎，但希望她能更成熟一点，有自己的小期待。';
                    j = '管理类、教育类、策划';
                    l = '懂事体贴、有独立思想';
                    a1=85,a2=88,a3=50; break;
                case 'AAC':
                    title = '奇怪型人格';
                    desc = '你的喜好比较特别，思维跳脱，不按常理出牌。';
                    j = '艺术创作、自由职业';
                    l = '有趣、特立独行';
                    a1=60,a2=50,a3=95; break;
                case 'ABA':
                    title = '小喜地扎型性格';
                    desc = '对地扎有好感，但不会完全沉迷，比较理性。';
                    j = '互联网、运营、文职';
                    l = '温柔可爱、相处轻松';
                    a1=75,a2=80,a3=55; break;
                case 'ABB':
                    title = '编不出来型人格';
                    desc = '你的选择组合太特别啦，暂时没有精准描述。';
                    j = '全能适配型';
                    l = '相处舒服最重要';
                    a1=66,a2=66,a3=66; break;
                case 'ABC':
                    title = '喜欢这三个型人格';
                    desc = '你包容性极强，三个类型都能欣赏，不挑不拣。';
                    j = '服务类、公关、协调';
                    l = '各种风格都可';
                    a1=80,a2=85,a3=70; break;
                case 'ACA':
                    title = '矛盾性人格';
                    desc = '内心想法比较矛盾，喜欢又纠结，情绪丰富。';
                    j = '心理类、文案、创作';
                    l = '能理解你的细腻类型';
                    a1=50,a2=70,a3=90; break;
                default:
                    title = '自行去问sinzan';
                    desc = '你的答案组合超出预设，快去问sinzan吧！';
                    j = '自由探索';
                    l = '随缘即可';
                    a1=50,a2=50,a3=50;
            }

            personaTitle.innerText = title;
            personaDesc.innerText = desc;
            job.innerText = j;
            lover.innerText = l;
            bar1.style.width = a1+'%';
            bar2.style.width = a2+'%';
            bar3.style.width = a3+'%';
        }

        render();
    </script>
</body>
</html>
